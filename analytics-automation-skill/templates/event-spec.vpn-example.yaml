# =============================================================================
# event-spec.yaml — VÍ DỤ cho app VPN
# =============================================================================

project:
  name: "VPN Lite"
  package: "com.example.vpnlite"
  application_class: "com.example.vpnlite.VpnLiteApp"
  version: "1.0.0"

  features:
    iap: true
    ads: true
    rate_dialog: true
    onboarding: true
    appsflyer: false
    permissions:
      - POST_NOTIFICATION

# -----------------------------------------------------------------------------
# SCREENS
# -----------------------------------------------------------------------------
screens:
  - id: splash
    class: SplashActivity

  - id: onboarding
    class: OnboardingActivity

  - id: home
    class: HomeActivity

  - id: server_list
    class: ServerListActivity

  - id: server_search
    class: ServerSearchFragment
    parent: server_list

  - id: premium
    class: PremiumActivity

  - id: settings
    class: SettingsActivity

  - id: connection_stats
    class: ConnectionStatsActivity

# -----------------------------------------------------------------------------
# POPUPS
# -----------------------------------------------------------------------------
popups:
  - id: rate_dialog
    class: RateUsDialog

  - id: connection_failed
    class: ConnectionFailedDialog

  - id: server_full
    class: ServerFullDialog

  - id: premium_required
    class: PremiumRequiredBottomSheet

  - id: permission_notification

  - id: disconnect_confirm
    class: DisconnectConfirmDialog

# -----------------------------------------------------------------------------
# BUTTONS
# -----------------------------------------------------------------------------
buttons:
  # ---- Home ----
  - { screen: home, id: btn_connect, name: ConnectButton }
  - { screen: home, id: btn_disconnect, name: DisconnectButton,
      triggers: [{ event: click_btn_ev, params: { popup: disconnect_confirm } }] }
  - { screen: home, id: btn_select_server, name: SelectServerButton }
  - { screen: home, id: btn_premium, name: PremiumButton,
      triggers: [{ event: iap_ev, params: { where: home_pro_icon } }] }
  - { screen: home, id: btn_stats, name: StatsButton }
  - { screen: home, id: btn_settings, name: SettingsButton }

  # ---- Server List ----
  - { screen: server_list, id: btn_select_server, name: SelectServerButton }
  - { screen: server_list, id: btn_premium_server, name: PremiumServerButton,
      popup: premium_required,
      triggers: [{ event: iap_ev, params: { where: server_list_premium } }] }
  - { screen: server_list, id: btn_search, name: SearchButton }
  - { screen: server_list, id: btn_sort_ping, name: SortByPingButton }
  - { screen: server_list, id: btn_sort_country, name: SortByCountryButton }
  - { screen: server_list, id: btn_favorite, name: FavoriteButton }

  # ---- Premium ----
  - { screen: premium, id: btn_monthly, name: MonthlyPlanButton }
  - { screen: premium, id: btn_yearly, name: YearlyPlanButton }
  - { screen: premium, id: btn_lifetime, name: LifetimePlanButton }
  - { screen: premium, id: btn_close, name: CloseButton }

  # ---- Settings ----
  - { screen: settings, id: btn_protocol, name: ProtocolButton }
  - { screen: settings, id: btn_kill_switch, name: KillSwitchToggle }
  - { screen: settings, id: btn_auto_connect, name: AutoConnectToggle }
  - { screen: settings, id: btn_rate, name: RateButton }
  - { screen: settings, id: btn_share, name: ShareButton }

  # ---- Rate Dialog ----
  - { screen: home, popup: rate_dialog, id: btn_5star, name: FiveStarButton }
  - { screen: home, popup: rate_dialog, id: btn_later, name: LaterButton }

  # ---- Disconnect Confirm ----
  - { screen: home, popup: disconnect_confirm, id: btn_yes, name: YesButton }
  - { screen: home, popup: disconnect_confirm, id: btn_cancel, name: CancelButton }

  # ---- Onboarding ----
  - { screen: onboarding, id: btn_next, name: NextButton }
  - { screen: onboarding, id: btn_skip, name: SkipButton }
  - { screen: onboarding, id: btn_done, name: DoneButton }

# -----------------------------------------------------------------------------
# CUSTOM EVENTS
# -----------------------------------------------------------------------------
custom_events:
  - name: vpn_connect_ev
    description: "User bấm Connect và nhận kết quả kết nối VPN"
    params:
      - { name: server_country, type: string, sample: "VN, US, JP" }
      - { name: server_city, type: string }
      - { name: protocol, type: string, enum: [openvpn, wireguard, ikev2] }
      - { name: connect_result, type: int, enum: [0, 1], meaning: "0=fail, 1=success" }
      - { name: connect_duration_ms, type: long, meaning: "thời gian connect" }
      - { name: is_premium_server, type: bool }
    trigger_hint:
      file: VpnConnectionManager.kt
      method: onConnectionResult

  - name: vpn_disconnect_ev
    description: "User chủ động disconnect hoặc bị disconnect bất thường"
    params:
      - { name: reason, type: string, enum: [user, network_lost, kill_switch, timeout, app_killed] }
      - { name: session_duration_sec, type: long }
      - { name: total_traffic_mb, type: long }
    trigger_hint:
      file: VpnConnectionManager.kt
      method: onDisconnected

  - name: server_selected_ev
    description: "User chọn 1 server từ danh sách"
    params:
      - { name: server_country, type: string }
      - { name: server_city, type: string }
      - { name: source, type: string, enum: [home, server_list, favorite, recent] }
      - { name: is_premium, type: bool }
    trigger_hint:
      file: ServerListViewModel.kt
      method: onServerSelected

  - name: kill_switch_triggered_ev
    description: "Kill switch tự kích hoạt khi mất connect VPN"
    params:
      - { name: app_blocked, type: string, meaning: "tên app đang foreground khi kill" }
    trigger_hint:
      file: KillSwitchService.kt
      method: onConnectionLost

# -----------------------------------------------------------------------------
# USER PROPERTIES
# -----------------------------------------------------------------------------
user_properties:
  - name: preferred_protocol
    type: string
    enum: [openvpn, wireguard, ikev2]
    trigger: "Khi user đổi protocol mặc định trong Settings"

  - name: kill_switch_enabled
    type: bool
    trigger: "Khi user toggle kill switch"

  - name: auto_connect_enabled
    type: bool
    trigger: "Khi user toggle auto connect"

  - name: favorite_servers_count
    type: int
    trigger: "Số server đã favorite. Update sau mỗi addFavorite/removeFavorite"

  - name: total_connections
    type: int
    trigger: "Tổng số lần connect thành công. Update mỗi lần connect_result=1"
