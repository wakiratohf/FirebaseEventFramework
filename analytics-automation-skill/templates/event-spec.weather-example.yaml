# =============================================================================
# event-spec.yaml — VÍ DỤ cho app Weather
# =============================================================================
# Đây là spec mẫu để Claude Code sinh ra Kotlin code đã quen thuộc với team.
# Dùng làm reference khi setup project mới hoặc khi migrate project Weather hiện có.
# =============================================================================

project:
  name: "Weather Forecast"
  package: "com.example.weather"
  application_class: "com.example.weather.WeatherApp"
  version: "1.0.0"

  features:
    iap: true
    ads: true
    rate_dialog: true
    onboarding: true
    appsflyer: false
    permissions:
      - POST_NOTIFICATION
      - LOCATION
      - LOCATION_BACKGROUND

# -----------------------------------------------------------------------------
# SCREENS
# -----------------------------------------------------------------------------
screens:
  - id: splash
    class: SplashActivity

  - id: onboarding
    class: OnboardingActivity

  - id: home
    class: HomeActivity

  - id: forecast_daily
    class: DailyForecastFragment
    parent: home

  - id: forecast_hourly
    class: HourlyForecastFragment
    parent: home

  - id: radar
    class: RadarFragment
    parent: home

  - id: location_picker
    class: LocationPickerActivity

  - id: location_search
    class: LocationSearchFragment
    parent: location_picker

  - id: settings
    class: SettingsActivity

  - id: settings_units
    class: UnitsSettingsFragment
    parent: settings

  - id: settings_notifications
    class: NotificationsSettingsFragment
    parent: settings

  - id: premium
    class: PremiumActivity

  - id: widget_config
    class: WidgetConfigureActivity

# -----------------------------------------------------------------------------
# POPUPS
# -----------------------------------------------------------------------------
popups:
  - id: rate_dialog
    class: RateUsDialog

  - id: permission_location
  - id: permission_notification
  - id: permission_background_location

  - id: severe_weather_alert
    class: SevereWeatherAlertDialog

  - id: theme_picker
    class: ThemePickerBottomSheet

# -----------------------------------------------------------------------------
# BUTTONS
# -----------------------------------------------------------------------------
buttons:
  # ---- Home ----
  - { screen: home, id: btn_refresh, name: RefreshButton }
  - { screen: home, id: btn_premium, name: PremiumButton,
      triggers: [{ event: iap_ev, params: { where: home_pro_icon } }] }
  - { screen: home, id: btn_add_location, name: AddLocationButton }
  - { screen: home, id: btn_radar, name: RadarTabButton }
  - { screen: home, id: btn_daily, name: DailyTabButton }
  - { screen: home, id: btn_hourly, name: HourlyTabButton }
  - { screen: home, id: btn_share, name: ShareButton }

  # ---- Location Picker ----
  - { screen: location_picker, id: btn_use_current, name: UseCurrentLocationButton }
  - { screen: location_picker, id: btn_search, name: SearchButton }
  - { screen: location_search, id: btn_select_city, name: SelectCityButton }

  # ---- Settings ----
  - { screen: settings, id: btn_units, name: UnitsButton }
  - { screen: settings, id: btn_notifications, name: NotificationsButton }
  - { screen: settings, id: btn_theme, name: ThemeButton, popup: theme_picker }
  - { screen: settings, id: btn_rate, name: RateButton }
  - { screen: settings, id: btn_share_app, name: ShareAppButton }
  - { screen: settings, id: btn_privacy, name: PrivacyPolicyButton }

  # ---- Settings Units ----
  - { screen: settings_units, id: btn_temp_celsius, name: TempCelsiusButton }
  - { screen: settings_units, id: btn_temp_fahrenheit, name: TempFahrenheitButton }
  - { screen: settings_units, id: btn_wind_kmh, name: WindKmhButton }
  - { screen: settings_units, id: btn_wind_mph, name: WindMphButton }

  # ---- Premium ----
  - { screen: premium, id: btn_monthly, name: MonthlyPlanButton }
  - { screen: premium, id: btn_yearly, name: YearlyPlanButton }
  - { screen: premium, id: btn_lifetime, name: LifetimePlanButton }
  - { screen: premium, id: btn_close, name: CloseButton }

  # ---- Rate Dialog ----
  - { screen: home, popup: rate_dialog, id: btn_5star, name: FiveStarButton }
  - { screen: home, popup: rate_dialog, id: btn_later, name: LaterButton }
  - { screen: home, popup: rate_dialog, id: btn_never, name: NeverButton }

  # ---- Onboarding ----
  - { screen: onboarding, id: btn_next, name: NextButton }
  - { screen: onboarding, id: btn_skip, name: SkipButton }
  - { screen: onboarding, id: btn_done, name: DoneButton }

# -----------------------------------------------------------------------------
# CUSTOM EVENTS
# -----------------------------------------------------------------------------
custom_events:
  - name: location_added_ev
    description: "User thêm thành công 1 location vào danh sách yêu thích"
    params:
      - { name: country_code, type: string }
      - { name: city_name, type: string }
      - { name: source, type: string, enum: [search, gps, suggest], meaning: "cách thêm" }
    trigger_hint:
      file: LocationRepository.kt
      method: addLocation

  - name: weather_refresh_ev
    description: "User pull-to-refresh hoặc auto refresh weather"
    params:
      - { name: source, type: string, enum: [manual, auto, widget, notification] }
      - { name: refresh_result, type: int, enum: [0, 1], meaning: "0=fail, 1=success" }
      - { name: cache_age_sec, type: long }
    trigger_hint:
      file: WeatherViewModel.kt
      method: refreshWeather

  - name: severe_alert_received_ev
    description: "Server push severe weather alert"
    params:
      - { name: alert_type, type: string, enum: [storm, hurricane, flood, heat, cold, snow] }
      - { name: severity, type: string, enum: [minor, moderate, severe, extreme] }
      - { name: action, type: string, enum: [shown, dismissed, clicked] }
    trigger_hint:
      file: SevereAlertNotificationHandler.kt
      method: onAlertReceived

  - name: widget_added_ev
    description: "User add widget Weather vào homescreen"
    params:
      - { name: widget_size, type: string, enum: [small, medium, large] }
      - { name: widget_theme, type: string, enum: [light, dark, auto] }
    trigger_hint:
      file: WeatherWidgetProvider.kt
      method: onEnabled

  - name: theme_changed_ev
    description: "User đổi theme app"
    params:
      - { name: theme, type: string, enum: [light, dark, auto] }
    trigger_hint:
      file: ThemeManager.kt
      method: setTheme

# -----------------------------------------------------------------------------
# USER PROPERTIES (extra ngoài 9 built-in)
# -----------------------------------------------------------------------------
user_properties:
  - name: temp_unit
    type: string
    enum: [celsius, fahrenheit]
    trigger: "Khi user đổi đơn vị nhiệt độ trong Settings"

  - name: wind_unit
    type: string
    enum: [kmh, mph, ms, knot]
    trigger: "Khi user đổi đơn vị tốc độ gió"

  - name: nums_locations
    type: int
    trigger: "Số location đang được track. Update sau mỗi addLocation/removeLocation"

  - name: has_widget
    type: bool
    trigger: "True khi user đã add ≥1 widget"

  - name: app_theme
    type: string
    enum: [light, dark, auto]
    trigger: "Theme hiện tại"
